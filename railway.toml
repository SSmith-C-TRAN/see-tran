# railway.toml — Railway deployment configuration
# https://docs.railway.com/reference/config-as-code

[build]
builder = "dockerfile"

[deploy]
startCommand = "echo BOOT source=railway.toml && echo BOOT launch_gunicorn PORT=$PORT FLASK_ENV=$FLASK_ENV && exec gunicorn --workers 1 --bind 0.0.0.0:$PORT --timeout 120 --log-level info --access-logfile - --error-logfile - --capture-output run:app"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
